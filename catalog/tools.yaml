categories:
  - id: messaging
    name: "💬 Messaging"
    description: "Chat and messaging applications"
    tools:
      - name: Signal
        description: "Encrypted, privacy-first messaging"
        website: "https://signal.org"
        dotfiles_default: true
        macos:
          cask: signal
        windows:
          winget: OpenWhisperSystems.Signal
        linux:
          apt: signal-desktop
          flatpak: org.signal.Signal

      - name: Telegram
        description: "Fast, cloud-based messaging"
        website: "https://telegram.org"
        dotfiles_default: true
        macos:
          cask: telegram
        windows:
          winget: Telegram.TelegramDesktop
        linux:
          apt: telegram-desktop
          flatpak: org.telegram.desktop

      - name: WhatsApp
        description: "WhatsApp desktop client"
        website: "https://www.whatsapp.com"
        dotfiles_default: true
        macos:
          cask: whatsapp
        windows:
          winget: 9NKSQGP7F2NH  # Microsoft Store
        linux:
          flatpak: net.mkiol.SpeechNote

      - name: Discord
        description: "Voice, video, and text chat"
        website: "https://discord.com"
        dotfiles_default: true
        macos:
          cask: discord
        windows:
          winget: Discord.Discord
        linux:
          apt: discord
          flatpak: com.discordapp.Discord

      - name: Slack
        description: "Team messaging and collaboration"
        website: "https://slack.com"
        dotfiles_default: true
        macos:
          cask: slack
        windows:
          winget: SlackTechnologies.Slack
        linux:
          apt: slack-desktop
          flatpak: com.slack.Slack

      - name: Microsoft Teams
        description: "Microsoft Teams collaboration"
        website: "https://teams.microsoft.com"
        dotfiles_default: true
        macos:
          cask: microsoft-teams
        windows:
          winget: Microsoft.Teams
        linux:
          flatpak: com.microsoft.Teams

      - name: Element
        description: "Decentralized, open-source Matrix client"
        website: "https://element.io"
        dotfiles_default: false
        macos:
          cask: element
        windows:
          winget: Element.Element
        linux:
          apt: element-desktop
          flatpak: im.riot.Riot

  - id: web-browsers
    name: "🌐 Web Browsers"
    description: "Web browsers for everyday use"
    tools:
      - name: Firefox
        description: "Open-source browser by Mozilla"
        website: "https://www.mozilla.org/firefox"
        dotfiles_default: true
        macos:
          cask: firefox
        windows:
          winget: Mozilla.Firefox
        linux:
          apt: firefox
          flatpak: org.mozilla.firefox

      - name: Brave
        description: "Privacy-focused browser"
        website: "https://brave.com"
        dotfiles_default: true
        macos:
          cask: brave-browser
        windows:
          winget: Brave.Brave
        linux:
          apt: brave-browser
          flatpak: com.brave.Browser

      - name: Arc
        description: "Modern, reimagined browser"
        website: "https://arc.net"
        dotfiles_default: true
        macos:
          cask: arc
        windows:
          winget: TheBrowserCompany.Arc

      - name: Google Chrome
        description: "Google's web browser"
        website: "https://www.google.com/chrome"
        dotfiles_default: false
        macos:
          cask: google-chrome
        windows:
          winget: Google.Chrome
        linux:
          apt: google-chrome-stable
