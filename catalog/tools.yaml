  - id: cli-essentials
    name: "🔧 CLI Essentials"
    description: "Essential command-line tools for every developer"
    tools:
      - name: git
        description: "Distributed version control system"
        website: "https://git-scm.com"
        dotfiles_default: true
        macos:
          formula: git
        windows:
          winget: Git.Git
        linux:
          apt: git
          dnf: git
          pacman: git

      - name: jq
        description: "Lightweight JSON processor"
