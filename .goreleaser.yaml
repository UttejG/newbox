# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: newbox
    main: ./cmd/newbox
    binary: newbox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64  # winget only on amd64 Windows

archives:
  - id: newbox
    name_template: "newbox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: UttejG
    name: newbox
  draft: false
  prerelease: auto
  name_template: "newbox {{.Version}}"
